<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔍 AI Scam Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            display: none;
        }
        
        #result.show {
            display: block;
        }
        
        #result.safe {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        #result.scam {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        #result .confidence {
            font-size: 0.8em;
            font-weight: normal;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .features {
            margin-top: 30px;
            display: flex;
            justify-content: space-around;
            font-size: 0.9em;
            color: #666;
        }
        
        .features span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #debug {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
            display: none;
            word-break: break-all;
        }

        #debug.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Scam Checker</h1>
        <p class="subtitle">AI-powered SMS and message scam detection</p>
        
        <div class="input-group">
            <textarea 
                id="message" 
                placeholder="Paste suspicious message, SMS, or text here..."
                rows="4"
            ></textarea>
            <button id="checkBtn">🔍 Check for Scam</button>
        </div>
        
        <div id="result"></div>
        <div id="debug"></div>
        
        <div class="features">
            <span>🤖 AI Powered</span>
            <span>⚡ Real-time</span>
            <span>🔒 100% Free</span>
        </div>
    </div>

    <script>
        // Wait for the page to load
        document.addEventListener('DOMContentLoaded', function() {
            console.log("✅ Page loaded successfully!");
            
            // Get elements
            const checkBtn = document.getElementById('checkBtn');
            const messageInput = document.getElementById('message');
            const resultDiv = document.getElementById('result');
            const debugDiv = document.getElementById('debug');
            
            // Add click event to button
            checkBtn.addEventListener('click', function() {
                console.log("🔘 Button clicked!");
                
                // Get the message
                const message = messageInput.value.trim();
                console.log("📝 Message:", message);
                
                // Clear previous result
                resultDiv.className = '';
                resultDiv.style.display = 'none';
                debugDiv.className = '';
                debugDiv.style.display = 'none';
                
                // Check if message is empty
                if (!message) {
                    console.log("⚠️ Empty message!");
                    resultDiv.innerHTML = '⚠️ Please enter some text to check!';
                    resultDiv.className = 'show';
                    resultDiv.style.backgroundColor = '#fff3cd';
                    resultDiv.style.color = '#856404';
                    resultDiv.style.border = '2px solid #ffc107';
                    return;
                }
                
                // Show loading
                console.log("⏳ Loading...");
                checkBtn.innerHTML = '<span class="loading"></span> Analyzing...';
                checkBtn.disabled = true;
                resultDiv.innerHTML = '⏳ Analyzing your message...';
                resultDiv.className = 'show';
                resultDiv.style.backgroundColor = '#e7f3ff';
                resultDiv.style.color = '#004085';
                resultDiv.style.border = '2px solid #b8d4f0';
                
                // Send request to backend
                console.log("📤 Sending request to /check...");
                fetch('/check', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: 'text=' + encodeURIComponent(message)
                })
                .then(function(response) {
                    console.log("📥 Response received! Status:", response.status);
                    return response.json();
                })
                .then(function(data) {
                    console.log("📊 Data received:", data);
                    
                    // Clear loading
                    checkBtn.innerHTML = '🔍 Check for Scam';
                    checkBtn.disabled = false;
                    
                    // Show debug info
                    debugDiv.innerHTML = '🔧 Debug: ' + JSON.stringify(data, null, 2);
                    debugDiv.className = 'show';
                    
                    // Show result
                    if (data.error) {
                        console.log("❌ Error in response:", data.error);
                        resultDiv.innerHTML = '❌ ' + data.error;
                        resultDiv.className = 'show';
                        resultDiv.style.backgroundColor = '#fff3cd';
                        resultDiv.style.color = '#856404';
                        resultDiv.style.border = '2px solid #ffc107';
                    } else {
                        console.log("✅ Success! Scam:", data.is_scam);
                        const confidenceText = data.confidence_percentage || (Math.round(data.confidence * 100) + '%');
                        resultDiv.innerHTML = `
                            <div>${data.message}</div>
                            <div class="confidence">Confidence: ${confidenceText}</div>
                        `;
                        resultDiv.className = `show ${data.is_scam ? 'scam' : 'safe'}`;
                        resultDiv.style.backgroundColor = '';
                        resultDiv.style.color = '';
                        resultDiv.style.border = '';
                    }
                })
                .catch(function(error) {
                    console.log("❌ ERROR:", error);
                    
                    // Clear loading
                    checkBtn.innerHTML = '🔍 Check for Scam';
                    checkBtn.disabled = false;
                    
                    // Show error
                    resultDiv.innerHTML = '❌ Error: ' + error.message + '. Make sure the server is running!';
                    resultDiv.className = 'show';
                    resultDiv.style.backgroundColor = '#f8d7da';
                    resultDiv.style.color = '#721c24';
                    resultDiv.style.border = '2px solid #f5c6cb';
                    
                    debugDiv.innerHTML = '🔧 Error: ' + error.toString();
                    debugDiv.className = 'show';
                });
            });
        });
    </script>
</body>
</html>
